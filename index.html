<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情展示中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="header-title">表情展示中心</h1>
        <p class="header-desc">发现和使用各种有趣的表情</p>
    </header>

    <main class="main">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索表情..." class="search-input">
        </div>

        <nav class="category-nav" id="category-nav">
            <!-- 分类标签由 JS 生成 -->
        </nav>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
        </div>

        <div id="emoji-grid" class="emoji-grid">
            <!-- 表情卡片由 JS 生成 -->
        </div>

        <div id="no-results" class="no-results hidden">
            <p>未找到匹配的表情</p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-row copyright">
            &copy; 2026 筱序二十
        </div>
        <div class="footer-row">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">滇ICP备2026003487号</a>
        </div>
        <div class="footer-row">
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=53310302000158" target="_blank" rel="noopener" class="beian-mps">
                <img src="https://www.qixz.cn/mps.png" alt="公网安备" class="beian-icon">
                滇公网安备53310302000158号
            </a>
        </div>
    </footer>

    <div id="modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <img id="modal-image" src="" alt="">
            <p id="modal-name"></p>
            <span id="modal-category"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
